<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #0a0a0b;
          --surface: #141415;
          --surface-hover: #1a1a1c;
          --border: #232325;
          --border-hover: #2e2e31;
          --text-primary: #f4f4f5;
          --text-secondary: #a1a1aa;
          --text-tertiary: #52525b;
          --accent: #6366f1;
          --accent-hover: #818cf8;
          --success: #22c55e;
          --danger: #ef4444;
          --danger-hover: #f87171;
          --radius: 10px;
          --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          font-family: 'Inter', -apple-system, sans-serif;
          background: var(--bg);
          color: var(--text-primary);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          padding: 80px 24px;
          -webkit-font-smoothing: antialiased;
        }

        .container {
          width: 100%;
          max-width: 480px;
        }

        .header {
          margin-bottom: 32px;
        }

        .header h1 {
          font-size: 22px;
          font-weight: 600;
          letter-spacing: -0.01em;
          margin-bottom: 6px;
        }

        .header p {
          font-size: 14px;
          color: var(--text-secondary);
          font-weight: 400;
        }

        .input-row {
          display: flex;
          gap: 8px;
          margin-bottom: 28px;
        }

        .input-row input {
          flex: 1;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 12px 14px;
          font-size: 14px;
          color: var(--text-primary);
          font-family: inherit;
          transition: border-color 150ms ease, background 150ms ease;
        }

        .input-row input::placeholder {
          color: var(--text-tertiary);
        }

        .input-row input:focus {
          outline: none;
          border-color: var(--accent);
          background: var(--surface-hover);
        }

        .input-row button {
          background: var(--accent);
          color: white;
          border: none;
          border-radius: var(--radius);
          padding: 12px 18px;
          font-size: 14px;
          font-weight: 500;
          font-family: inherit;
          cursor: pointer;
          transition: background 150ms ease, transform 150ms ease;
          white-space: nowrap;
        }

        .input-row button:hover {
          background: var(--accent-hover);
        }

        .input-row button:active {
          transform: scale(0.97);
        }

        .stats {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;
          padding: 0 2px;
        }

        .stats span {
          font-size: 13px;
          color: var(--text-tertiary);
          font-weight: 500;
        }

        .filters {
          display: flex;
          gap: 4px;
        }

        .filter-btn {
          background: transparent;
          border: none;
          color: var(--text-tertiary);
          font-size: 13px;
          font-weight: 500;
          font-family: inherit;
          padding: 4px 10px;
          border-radius: 6px;
          cursor: pointer;
          transition: color 150ms ease, background 150ms ease;
        }

        .filter-btn:hover {
          color: var(--text-secondary);
          background: var(--surface);
        }

        .filter-btn.active {
          color: var(--text-primary);
          background: var(--surface);
        }

        .todo-list {
          list-style: none;
          display: flex;
          flex-direction: column;
          gap: 6px;
        }

        .todo-item {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 13px 14px;
          display: flex;
          align-items: center;
          gap: 12px;
          transition: border-color 150ms ease, background 150ms ease, transform 150ms ease, opacity 150ms ease;
          box-shadow: var(--shadow);
        }

        .todo-item:hover {
          border-color: var(--border-hover);
        }

        .todo-item.removing {
          opacity: 0;
          transform: translateX(8px) scale(0.98);
        }

        .checkbox {
          width: 18px;
          height: 18px;
          border-radius: 50%;
          border: 1.5px solid var(--text-tertiary);
          cursor: pointer;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: border-color 150ms ease, background 150ms ease;
        }

        .checkbox:hover {
          border-color: var(--accent);
        }

        .checkbox.checked {
          background: var(--success);
          border-color: var(--success);
        }

        .checkbox.checked::after {
          content: "✓";
          color: var(--bg);
          font-size: 11px;
          font-weight: 700;
        }

        .todo-title {
          flex: 1;
          font-size: 14px;
          font-weight: 450;
          color: var(--text-primary);
          word-break: break-word;
          transition: color 150ms ease;
        }

        .todo-title.completed {
          color: var(--text-tertiary);
          text-decoration: line-through;
        }

        .todo-title[contenteditable="true"] {
          outline: none;
          border-bottom: 1px solid var(--accent);
        }

        .delete-btn {
          background: transparent;
          border: none;
          color: var(--text-tertiary);
          font-size: 13px;
          cursor: pointer;
          padding: 4px 8px;
          border-radius: 6px;
          opacity: 0;
          transition: opacity 150ms ease, color 150ms ease, background 150ms ease;
          flex-shrink: 0;
        }

        .todo-item:hover .delete-btn {
          opacity: 1;
        }

        .delete-btn:hover {
          color: var(--danger-hover);
          background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
          text-align: center;
          padding: 48px 0;
          color: var(--text-tertiary);
          font-size: 14px;
        }

        .empty-state .icon {
          font-size: 28px;
          margin-bottom: 10px;
          opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Todo</h1>
        <p>Stay on top of what matters.</p>
    </div>

    <div class="input-row">
        <input id="title" type="text" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTodo()">
        <button onclick="addTodo()">Add</button>
    </div>

    <div class="stats">
        <span id="counter">0 tasks</span>
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Done</button>
        </div>
    </div>

    <ul class="todo-list" id="todoList"></ul>
</div>

<script>
    const API = "http://localhost:8080/api/todos";
    let todos = [];
    let currentFilter = "all";

    function loadTodos() {
      fetch(API)
        .then(res => res.json())
        .then(data => {
          todos = data;
          render();
        })
        .catch(err => console.error("Failed to load todos:", err));
    }

    function render() {
      const list = document.getElementById("todoList");
      const filtered = todos.filter(t => {
        if (currentFilter === "active") return !t.completed;
        if (currentFilter === "completed") return t.completed;
        return true;
      });

      const activeCount = todos.filter(t => !t.completed).length;
      document.getElementById("counter").textContent =
        activeCount === 1 ? "1 task left" : `${activeCount} tasks left`;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">○</div>Nothing here yet</div>`;
        return;
      }

      list.innerHTML = "";
      filtered.forEach(todo => {
        const li = document.createElement("li");
        li.className = "todo-item";
        li.dataset.id = todo.id;

        const checkbox = document.createElement("div");
        checkbox.className = "checkbox" + (todo.completed ? " checked" : "");
        checkbox.onclick = () => toggleComplete(todo);

        const title = document.createElement("span");
        title.className = "todo-title" + (todo.completed ? " completed" : "");
        title.textContent = todo.title;
        title.ondblclick = () => editTitle(title, todo);

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "Delete";
        del.onclick = () => deleteTodo(todo.id, li);

        li.appendChild(checkbox);
        li.appendChild(title);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    function addTodo() {
      const input = document.getElementById("title");
      const title = input.value.trim();
      if (!title) return;

      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: title, completed: false })
      })
        .then(() => {
          input.value = "";
          loadTodos();
        })
        .catch(err => console.error("Failed to add todo:", err));
    }

    function toggleComplete(todo) {
      fetch(`${API}/${todo.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: todo.title, completed: !todo.completed })
      })
        .then(() => loadTodos())
        .catch(err => console.error("Failed to update todo:", err));
    }

    function editTitle(span, todo) {
      span.contentEditable = "true";
      span.focus();

      const save = () => {
        span.contentEditable = "false";
        const newTitle = span.textContent.trim();
        if (newTitle && newTitle !== todo.title) {
          fetch(`${API}/${todo.id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTitle, completed: todo.completed })
          }).then(() => loadTodos());
        } else {
          span.textContent = todo.title;
        }
      };

      span.onblur = save;
      span.onkeydown = (e) => {
        if (e.key === "Enter") { e.preventDefault(); span.blur(); }
      };
    }

    function deleteTodo(id, li) {
      li.classList.add("removing");
      setTimeout(() => {
        fetch(`${API}/${id}`, { method: "DELETE" })
          .then(() => loadTodos())
          .catch(err => console.error("Failed to delete todo:", err));
      }, 150);
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === filter);
      });
      render();
    }

    loadTodos();
</script>

</body>
</html>
